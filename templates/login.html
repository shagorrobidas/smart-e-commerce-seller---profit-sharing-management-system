{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Seller System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #d4d4d4;
        }

        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }

        .input-glass:focus {
            border-color: #6366f1;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
    </style>
</head>

<body class="bg-grid min-h-screen flex items-center justify-center p-6 antialiased">
    <!-- Glow Effect -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-indigo-600/10 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="w-full max-w-md relative z-10">
        <div class="glass-card rounded-2xl p-8 md:p-10 shadow-2xl">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-14 h-14 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-xl text-white text-2xl font-bold mb-6 shadow-lg shadow-indigo-500/20">
                    S
                </div>
                <h1 class="text-2xl font-semibold text-white tracking-tight">Welcome Back</h1>
                <p class="text-sm text-gray-400 mt-2 font-light">Access your dashboard</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label for="email" class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">Email Address</label>
                    <input type="email" id="email" 
                        class="input-glass w-full px-4 py-3 rounded-lg text-sm text-white placeholder-gray-500 outline-none"
                        placeholder="name@company.com" required>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label for="password" class="block text-xs font-medium text-gray-400 uppercase tracking-wider">Password</label>
                        <a href="{% url 'forgot-password' %}" class="text-[11px] text-indigo-400 hover:text-indigo-300 transition-colors">Forgot password?</a>
                    </div>
                    <input type="password" id="password" 
                        class="input-glass w-full px-4 py-3 rounded-lg text-sm text-white placeholder-gray-500 outline-none"
                        placeholder="••••••••" required>
                </div>

                <div class="flex items-center">
                    <input type="checkbox" id="remember" class="w-4 h-4 rounded border-white/10 bg-white/5 text-indigo-600 focus:ring-indigo-500 focus:ring-offset-black">
                    <label for="remember" class="ml-2 text-xs text-gray-400 cursor-pointer">Remember me for 30 days</label>
                </div>

                <button type="submit" 
                    class="w-full py-3 px-4 rounded-lg bg-white text-black text-sm font-semibold hover:bg-gray-200 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    Sign In
                    <iconify-icon icon="solar:login-2-linear" width="18"></iconify-icon>
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-white/5 text-center">
                <p class="text-xs text-gray-500">
                    Don't have an account? 
                    <a href="{% url 'register' %}" class="text-indigo-400 hover:text-indigo-300 font-medium transition-colors ml-1">Create Account</a>
                </p>
            </div>
            
            <div class="mt-4 text-center">
                <a href="{% url 'index' %}" class="inline-flex items-center gap-2 text-[10px] text-gray-600 hover:text-gray-400 transition-colors">
                    <iconify-icon icon="solar:arrow-left-linear"></iconify-icon>
                    Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="{% static 'js/data-manager.js' %}"></script>
    <script src="{% static 'js/auth.js' %}"></script>
</body>

</html>
