{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Seller System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #d4d4d4;
        }

        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }

        .input-glass:focus {
            border-color: #6366f1;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        select option {
            background-color: #1a1a1a;
            color: #d4d4d4;
        }
    </style>
</head>

<body class="bg-grid min-h-screen flex items-center justify-center p-6 antialiased pt-12 pb-12">
    <!-- Glow Effect -->
    <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-indigo-600/5 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-purple-600/5 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="w-full max-w-lg relative z-10">
        <div class="glass-card rounded-2xl p-8 md:p-10 shadow-2xl">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-14 h-14 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-xl text-white text-2xl font-bold mb-6 shadow-lg shadow-indigo-500/20">
                    S
                </div>
                <h1 class="text-2xl font-semibold text-white tracking-tight">Create Account</h1>
                <p class="text-sm text-gray-400 mt-2 font-light">Join the ecosystem today</p>
            </div>

            <form id="registerForm" class="space-y-5">
                <div class="space-y-2">
                    <label for="company" class="block text-xs font-medium text-gray-400 uppercase tracking-wider">Company/Business Name</label>
                    <select id="company" required 
                        class="input-glass w-full px-4 py-3 rounded-lg text-sm text-white outline-none appearance-none cursor-pointer">
                        <option value="" disabled selected>Loading businesses...</option>
                    </select>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="space-y-2">
                        <label for="name" class="block text-xs font-medium text-gray-400 uppercase tracking-wider">Full Name</label>
                        <input type="text" id="name" 
                            class="input-glass w-full px-4 py-3 rounded-lg text-sm text-white placeholder-gray-500 outline-none" 
                            placeholder="John Doe" required>
                    </div>
                    <div class="space-y-2">
                        <label for="role" class="block text-xs font-medium text-gray-400 uppercase tracking-wider">Account Role</label>
                        <select id="role" required 
                            class="input-glass w-full px-4 py-3 rounded-lg text-sm text-white outline-none appearance-none cursor-pointer">
                            <option value="staff">Staff/Seller</option>
                            <option value="investor">Investor</option>
                            <option value="admin">Administrator</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-2">
                    <label for="email" class="block text-xs font-medium text-gray-400 uppercase tracking-wider">Email Address</label>
                    <input type="email" id="email" 
                        class="input-glass w-full px-4 py-3 rounded-lg text-sm text-white placeholder-gray-500 outline-none" 
                        placeholder="name@company.com" required>
                </div>
                
                <div class="space-y-2">
                    <label for="password" class="block text-xs font-medium text-gray-400 uppercase tracking-wider">Password</label>
                    <input type="password" id="password" 
                        class="input-glass w-full px-4 py-3 rounded-lg text-sm text-white placeholder-gray-500 outline-none" 
                        placeholder="••••••••" required>
                </div>

                <div class="pt-4">
                    <button type="submit" 
                        class="w-full py-3 px-4 rounded-lg bg-white text-black text-sm font-semibold hover:bg-gray-200 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                        Register Now
                        <iconify-icon icon="solar:user-plus-linear" width="18"></iconify-icon>
                    </button>
                </div>
            </form>

            <div class="mt-8 pt-8 border-t border-white/5 text-center">
                <p class="text-xs text-gray-500">
                    Already have an account? 
                    <a href="{% url 'login' %}" class="text-indigo-400 hover:text-indigo-300 font-medium transition-colors ml-1">Sign In</a>
                </p>
            </div>
            
            <div class="mt-4 text-center">
                <a href="{% url 'index' %}" class="inline-flex items-center gap-2 text-[10px] text-gray-600 hover:text-gray-400 transition-colors">
                    <iconify-icon icon="solar:arrow-left-linear"></iconify-icon>
                    Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="{% static 'js/data-manager.js' %}"></script>
    <script src="{% static 'js/auth.js' %}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const companySelect = document.getElementById('company');
            try {
                const response = await DB.getBusinesses();
                const businesses = response.results || response; 
                if (businesses && businesses.length > 0) {
                    companySelect.innerHTML = '<option value="" disabled selected>Select Your Business</option>';
                    businesses.forEach(b => {
                        const opt = document.createElement('option');
                        opt.value = b.name;
                        opt.textContent = b.name;
                        companySelect.appendChild(opt);
                    });
                } else {
                    companySelect.innerHTML = '<option value="" disabled selected>No businesses found</option>';
                }
            } catch (err) {
                console.error('Failed to load businesses', err);
                companySelect.innerHTML = '<option value="" disabled selected>Error loading businesses</option>';
            }
        });
    </script>
</body>

</html>
