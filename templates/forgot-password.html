{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Smart Seller System</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body class="auth-body">

    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo" style="margin-bottom: 1rem;">S</div>
            <h2>Reset Password</h2>
            <p style="color: var(--text-muted); font-size: 0.875rem; margin-top: 0.5rem;">Enter your email to receive
                instructions</p>
        </div>

        <form id="forgotForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@company.com" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Send Reset Link</button>
        </form>

        <div class="auth-footer">
            <a href="{% url 'login' %}">← Back to Login</a>
        </div>
    </div>

    <script src="{% static 'js/data-manager.js' %}"></script>
    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/auth.js' %}"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            
            try {
                btn.disabled = true;
                btn.textContent = 'Sending...';
                
                const response = await DB.forgotPassword(email);
                alert(response.message || 'If an account exists, a reset link has been sent.');
                
                // For demo purposes, we'll redirect to login after a delay
                setTimeout(() => {
                    window.location.href = "{% url 'login' %}";
                }, 2000);
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        });
    </script>
</body>

</html>
