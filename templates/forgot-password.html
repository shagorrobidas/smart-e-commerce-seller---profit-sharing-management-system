{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Smart Seller System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #d4d4d4;
        }

        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }

        .input-glass:focus {
            border-color: #6366f1;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
    </style>
</head>

<body class="bg-grid min-h-screen flex items-center justify-center p-6 antialiased">
    <!-- Glow Effect -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-purple-600/10 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="w-full max-w-md relative z-10">
        <div class="glass-card rounded-2xl p-8 md:p-10 shadow-2xl">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-14 h-14 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-xl text-white text-2xl font-bold mb-6 shadow-lg shadow-indigo-500/20">
                    S
                </div>
                <h1 class="text-2xl font-semibold text-white tracking-tight">Reset Password</h1>
                <p class="text-sm text-gray-400 mt-2 font-light">Enter your email to receive instructions</p>
            </div>

            <form id="forgotForm" class="space-y-6">
                <div>
                    <label for="email" class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">Email Address</label>
                    <input type="email" id="email" 
                        class="input-glass w-full px-4 py-3 rounded-lg text-sm text-white placeholder-gray-500 outline-none"
                        placeholder="name@company.com" required>
                </div>

                <button type="submit" 
                    class="w-full py-3 px-4 rounded-lg bg-white text-black text-sm font-semibold hover:bg-gray-200 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    Send Reset Link
                    <iconify-icon icon="solar:letter-linear" width="18"></iconify-icon>
                </button>
            </form>

            <div class="mt-8 text-center pt-8 border-t border-white/5">
                <a href="{% url 'login' %}" class="inline-flex items-center gap-2 text-[11px] text-indigo-400 hover:text-indigo-300 transition-colors">
                    <iconify-icon icon="solar:arrow-left-linear"></iconify-icon>
                    Back to Login
                </a>
            </div>
            
            <div class="mt-4 text-center">
                <a href="{% url 'index' %}" class="inline-flex items-center gap-2 text-[10px] text-gray-600 hover:text-gray-400 transition-colors">
                    Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="{% static 'js/data-manager.js' %}"></script>
    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/auth.js' %}"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            
            try {
                btn.disabled = true;
                btn.innerHTML = '<iconify-icon icon="line-md:loading-loop" width="18"></iconify-icon> Sending...';
                
                const response = await DB.forgotPassword(email);
                alert(response.message || 'If an account exists, a reset link has been sent.');
                
                setTimeout(() => {
                    window.location.href = "{% url 'login' %}";
                }, 2000);
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        });
    </script>
</body>

</html>
