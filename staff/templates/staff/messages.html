{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Staff</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
        .chat-container {
            display: flex;
            height: calc(100vh - 140px);
            gap: 1rem;
        }

        .chat-sidebar {
            width: 300px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            padding: 1rem;
            overflow-y: auto;
        }

        .chat-main {
            flex: 1;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
        }

        .user-item {
            padding: 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: background 0.2s;
            margin-bottom: 0.5rem;
        }

        .user-item:hover,
        .user-item.active {
            background: rgba(255, 255, 255, 0.05);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
            flex-shrink: 0;
        }

        .messages-area {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: rgba(0,0,0,0.1);
        }

        .message {
            max-width: 70%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.4;
            position: relative;
        }

        .message.received {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border-bottom-left-radius: 2px;
        }

        .message.sent {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .chat-input {
            padding: 1rem;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 0.5rem;
        }

        .chat-input input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            padding: 0.75rem;
            border-radius: 6px;
            color: white;
        }
    </style>
</head>

<body class="dashboard-body">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div
                style="width: 24px; height: 24px; background: linear-gradient(to top right, var(--primary), var(--accent-purple)); border-radius: 4px; display: flex; align-items: center; justify-content: center; color: white;">
                S</div>
            <span style="font-weight: 500;">Staff Portal</span>
        </div>
        <nav class="sidebar-nav">
            <a href="{% url 'staff-dashboard' %}" class="nav-item">
                <iconify-icon icon="solar:widget-linear"></iconify-icon> Operations
            </a>
            <a href="{% url 'staff-inventory' %}" class="nav-item">
                <iconify-icon icon="solar:box-minimalistic-linear"></iconify-icon> Inventory
            </a>
            <a href="{% url 'staff-orders' %}" class="nav-item">
                <iconify-icon icon="solar:bag-check-linear"></iconify-icon> Orders
            </a>
            <a href="{% url 'staff-tasks' %}" class="nav-item">
                <iconify-icon icon="solar:checklist-minimalistic-linear"></iconify-icon> Tasks
            </a>
            <a href="{% url 'staff-messages' %}" class="nav-item active">
                <iconify-icon icon="solar:chat-round-dots-linear"></iconify-icon> Messages
            </a>
            <a href="{% url 'staff-reports' %}" class="nav-item">
                <iconify-icon icon="solar:file-text-linear"></iconify-icon> My Reports
            </a>
        </nav>
        <div class="user-profile">
            <a href="{% url 'profile' %}"
                style="display: flex; gap: 0.75rem; text-decoration: none; align-items: center; flex: 1;">
                <div class="avatar" style="background: var(--accent-purple);">S</div>
                <div>
                    <p class="text-sm text-white" id="user-name">Staff</p>
                    <p class="text-xs text-muted" id="user-role">Operations</p>
                </div>
            </a>
            <button onclick="App.logout()"
                style="margin-left: auto; background: none; border: none; color: var(--text-muted); cursor: pointer;"><iconify-icon
                    icon="solar:logout-linear"></iconify-icon></button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="top-bar">
            <h1 class="page-title">Internal Chat</h1>
        </header>

        <div class="chat-container">
            <div class="chat-sidebar" id="user-list">
                <!-- JS Populated -->
            </div>

            <div class="chat-main">
                <div class="messages-area" id="msg-area">
                    <div
                        style="display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-muted);">
                        Select a colleague to start chatting</div>
                </div>
                <form class="chat-input" id="chat-form" style="display: none;">
                    <input type="text" id="msg-input" placeholder="Type a message..." required>
                    <button type="submit" class="btn btn-primary" style="width: auto; padding: 0 1rem;"><iconify-icon
                            icon="solar:plain-linear"></iconify-icon></button>
                </form>
            </div>
        </div>
    </main>

    <script src="{% static 'js/data-manager.js' %}"></script>
    <script src="{% static 'js/main.js' %}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = App.checkAuth();
            if (!user || user.role !== 'staff') window.location.href = '{% url "login" %}';

            // UI Init
            const userNameEl = document.getElementById('user-name');
            if (userNameEl) userNameEl.textContent = user.name;
            const userRoleEl = document.getElementById('user-role');
            if (userRoleEl) userRoleEl.textContent = user.role.toUpperCase();

            let activeChatUser = null;
            let pollingInterval = null;

            const loadUsers = async () => {
                try {
                    const data = await DB.getStaffUsers();
                    const users = Array.isArray(data) ? data : (data.results || []);
                    const filteredUsers = users.filter(u => u.id !== user.id);
                    const userList = document.getElementById('user-list');
                    
                    userList.innerHTML = filteredUsers.map(u => `
                        <div class="user-item" onclick="selectUser(${u.id}, '${u.name}')" data-id="${u.id}">
                            <div class="user-avatar" style="background: ${u.role === 'admin' ? 'var(--accent-purple)' : 'var(--primary)'}">${u.name.charAt(0)}</div>
                            <div>
                                <div style="font-size: 0.9rem; font-weight: 500;">${u.name}</div>
                                <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: capitalize;">${u.role}</div>
                            </div>
                        </div>
                    `).join('');
                } catch (err) { console.error(err); }
            };

            window.selectUser = (targetId, targetName) => {
                activeChatUser = targetId;
                document.getElementById('chat-form').style.display = 'flex';
                
                // Highlight active
                const items = document.querySelectorAll('.user-item');
                items.forEach(i => {
                    i.classList.toggle('active', i.dataset.id == targetId);
                });

                renderMessages();
                
                // Clear old polling and start new
                if (pollingInterval) clearInterval(pollingInterval);
                pollingInterval = setInterval(renderMessages, 5000);
            };

            const renderMessages = async () => {
                if (!activeChatUser) return;
                try {
                    const data = await DB.getMessages();
                    const allMsgs = Array.isArray(data) ? data : (data.results || []);
                    
                    // Filter messages for current conversation
                    const msgs = allMsgs.filter(m => 
                        (m.sender == user.id && m.receiver == activeChatUser) ||
                        (m.sender == activeChatUser && m.receiver == user.id)
                    ).sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

                    const area = document.getElementById('msg-area');

                    if (msgs.length === 0) {
                        area.innerHTML = '<div style="text-align: center; color: var(--text-muted); margin-top: 2rem;">No messages yet. Say hi!</div>';
                    } else {
                        area.innerHTML = msgs.map(m => `
                            <div class="message ${m.sender == user.id ? 'sent' : 'received'}">
                                ${m.content}
                                <div style="font-size: 10px; opacity: 0.7; margin-top: 4px; text-align: right;">
                                    ${new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                                </div>
                            </div>
                        `).join('');
                    }
                    area.scrollTop = area.scrollHeight;
                } catch (err) { console.error(err); }
            };

            document.getElementById('chat-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const input = document.getElementById('msg-input');
                const text = input.value.trim();
                if (!text || !activeChatUser) return;

                try {
                    await DB.sendMessage({
                        receiver: activeChatUser,
                        content: text
                    });
                    input.value = '';
                    await renderMessages();
                } catch (err) { alert(err.message); }
            });

            await loadUsers();
        });
    </script>
</body>

</html>

</html>
